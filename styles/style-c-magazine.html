<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecWeekly - 风格C · 杂志网格风</title>
<style>
  :root {
    --bg: #fafaf9;
    --card-bg: #fff;
    --text: #1c1917;
    --text-secondary: #78716c;
    --accent: #ef4444;
    --accent2: #8b5cf6;
    --border: #e7e5e4;
    --shadow: 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Charter", "Georgia", "Noto Serif SC", serif; background: var(--bg); color: var(--text); }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  .header { text-align: center; padding: 40px 0 30px; }
  .header .kicker { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); font-family: -apple-system, sans-serif; font-weight: 600; margin-bottom: 8px; }
  .header h1 { font-size: 42px; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { font-size: 15px; color: var(--text-secondary); margin-top: 8px; font-family: -apple-system, sans-serif; }
  .header .date-bar { display: flex; justify-content: center; gap: 20px; margin-top: 14px; font-size: 12px; color: var(--text-secondary); font-family: -apple-system, sans-serif; text-transform: uppercase; letter-spacing: 1px; }

  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
  .search-box { position: relative; }
  .search-box input { padding: 10px 16px 10px 36px; border: 1px solid var(--border); border-radius: 24px; font-size: 14px; width: 260px; outline: none; font-family: -apple-system, sans-serif; background: var(--card-bg); }
  .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
  .search-box::before { content: "🔍"; position: absolute; left: 12px; top: 10px; font-size: 14px; }
  .tag-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-pill { padding: 6px 16px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); cursor: pointer; transition: all .15s; font-family: -apple-system, sans-serif; background: var(--card-bg); }
  .tag-pill:hover, .tag-pill.active { background: var(--text); color: #fff; border-color: var(--text); }

  .hero { margin-bottom: 32px; }
  .hero-card {
    background: linear-gradient(135deg, #1c1917 0%, #292524 100%); color: #fff;
    border-radius: 20px; padding: 40px 44px; display: grid; grid-template-columns: 1.2fr 0.8fr;
    gap: 40px; align-items: center; box-shadow: var(--shadow-lg);
  }
  .hero-card .hero-tag { display: inline-block; background: var(--accent); padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-family: -apple-system, sans-serif; margin-bottom: 14px; }
  .hero-card h2 { font-size: 28px; font-weight: 800; line-height: 1.25; margin-bottom: 12px; letter-spacing: -.5px; }
  .hero-card .hero-summary { font-size: 15px; line-height: 1.6; opacity: .8; font-family: -apple-system, sans-serif; }
  .hero-card .hero-meta { margin-top: 16px; font-size: 12px; opacity: .6; font-family: -apple-system, sans-serif; }
  .hero-source { display: flex; align-items: center; gap: 12px; }
  .hero-source .hero-icon { font-size: 48px; }
  .hero-source .hero-name { font-size: 16px; font-weight: 600; font-family: -apple-system, sans-serif; }

  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 16px; font-family: -apple-system, sans-serif; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex:1; height: 1px; background: var(--border); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 36px; }
  .card { background: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); transition: all .25s; border: 1px solid var(--border); display: flex; flex-direction: column; }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .card-color-bar { height: 4px; }
  .card-color-bar.re-tool { background: linear-gradient(90deg, #06b6d4, #22d3ee); }
  .card-color-bar.malware { background: linear-gradient(90deg, #ef4444, #f87171); }
  .card-color-bar.infra { background: linear-gradient(90deg, #10b981, #34d399); }
  .card-color-bar.exploit { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .card-color-bar.default-bar { background: linear-gradient(90deg, #78716c, #a8a29e); }
  .card-body { padding: 20px 22px; flex:1; display: flex; flex-direction: column; }
  .card-source { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 6px; font-family: -apple-system, sans-serif; display: flex; align-items: center; gap: 6px; }
  .card-source .icon { font-size: 18px; }
  .card-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; letter-spacing: -.3px; }
  .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.55; flex:1; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; font-size: 11px; color: #a8a29e; font-family: -apple-system, sans-serif; }
  .card-tags { display: flex; gap: 4px; }
  .card-tag { padding: 2px 8px; background: #f5f5f4; border-radius: 12px; font-size: 10px; color: var(--text-secondary); }

  .footer { text-align: center; padding: 32px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border); font-family: -apple-system, sans-serif; margin-top: 20px; }

  @media (max-width: 768px) {
    .hero-card { grid-template-columns: 1fr; padding: 28px 24px; gap: 20px; }
    .hero-card h2 { font-size: 22px; }
    .header h1 { font-size: 30px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">

</div>

const TAG_COLORS = {
  '逆向工具': 're-tool', '反编译': 're-tool', '调试': 're-tool',
  'APT': 'malware', 'Rootkit': 'malware', '恶意软件': 'malware',
  '漏洞分析': 'exploit', 'CVE': 'exploit', 'RCE': 'exploit', 'PWN': 'exploit', '漏洞利用': 'exploit',
  '动态插桩': 'infra', 'CPU模拟': 'infra', '网络分析': 'infra',
};

function getColorClass(tags) {
  for (const t of tags) if (TAG_COLORS[t]) return TAG_COLORS[t];
  return 'default-bar';
}

let activeTag = null;

function getAllTags() {
  const set = new Set();
  DATA.forEach(a => a.tags.forEach(t => set.add(t)));
  return [...set].sort();
}

function renderTagPills() {
  const tags = getAllTags();
  document.getElementById('tagPills').innerHTML = tags.map(t => `<span class="tag-pill" onclick="toggleTag('${t}')" data-tag="${t}">${t}</span>`).join('');
}

function toggleTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  document.querySelectorAll('.tag-pill').forEach(el => el.classList.toggle('active', el.dataset.tag === activeTag));
  render();
}

function render() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();
  let articles = DATA;
  if (keyword) articles = articles.filter(a => a.title.toLowerCase().includes(keyword) || a.summary.toLowerCase().includes(keyword) || a.tags.some(t => t.toLowerCase().includes(keyword)));
  if (activeTag) articles = articles.filter(a => a.tags.includes(activeTag));

  if (articles.length > 0 && !keyword && !activeTag) {
    const h = articles[0];
    document.getElementById('hero').style.display = '';
    document.getElementById('hero').innerHTML = `
      <div class="hero-card">
        <div>
          <span class="hero-tag">🔥 头条</span>
          <h2>${h.title}</h2>
          <p class="hero-summary">${h.summary}</p>
          <p class="hero-meta">${h.date} · ${h.read_time} 分钟阅读 · 来源 ${h.source}</p>
        </div>
        <div class="hero-source">
          <div class="hero-icon">${h.source_icon}</div>
          <div class="hero-name">${h.source}</div>
        </div>
      </div>`;
  } else {
    document.getElementById('hero').style.display = 'none';
  }

  const gridArticles = (!keyword && !activeTag) ? articles.slice(1) : articles;
  document.getElementById('grid').innerHTML = gridArticles.map(a => `
    <div class="card">
      <div class="card-color-bar ${getColorClass(a.tags)}"></div>
      <div class="card-body">
        <div class="card-source"><span class="icon">${a.source_icon}</span>${a.source}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary">${a.summary}</div>
        <div class="card-footer">
          <span>${a.date} · ${a.read_time}min</span>
          <div class="card-tags">${a.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    </div>
  `).join('');
}

renderTagPills();
render();
</script>

</body>
</html>
