<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecWeekly - 每日安全研究速览</title>
<style>
  :root {
    --bg: #f6f6ef;
    --text: #000;
    --text-secondary: #828282;
    --link: #000;
    --link-visited: #828282;
    --accent: #ff6600;
    --border: #e0e0d8;
    --hover-bg: #f0f0e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Verdana, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  .container { max-width: 860px; margin: 0 auto; padding: 0 8px; }

  .topbar {
    background: var(--accent); padding: 3px 4px; display: flex; align-items: center;
    gap: 12px; font-size: 13px;
  }
  .topbar-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 12px; padding: 2px 0; }
  .topbar .logo { font-weight: 800; color: #fff; text-decoration: none; font-size: 15px; letter-spacing: -.3px; }
  .topbar a { color: #fff; text-decoration: none; }
  .topbar .sep { color: rgba(255,255,255,.6); }
  .topbar .date { color: rgba(255,255,255,.85); margin-left: auto; font-size: 12px; }

  .search-row { padding: 10px 0; border-bottom: 2px solid var(--accent); margin-bottom: 0; }
  .search-row input {
    width: 100%; padding: 6px 10px; border: 1px solid var(--border); font-size: 13px;
    font-family: inherit; background: #fff; outline: none;
  }
  .search-row input:focus { border-color: var(--accent); }

  .tag-nav { padding: 6px 0; font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .tag-nav a { color: var(--text-secondary); text-decoration: none; cursor: pointer; }
  .tag-nav a:hover, .tag-nav a.active { color: var(--accent); font-weight: 600; }

  .article-item { display: flex; gap: 8px; padding: 7px 4px; align-items: baseline; border-bottom: 1px dotted var(--border); }
  .article-item:hover { background: var(--hover-bg); }
  .article-num { color: var(--text-secondary); font-size: 13px; min-width: 22px; text-align: right; flex-shrink: 0; }
  .article-num.top { color: var(--accent); font-weight: 700; }
  .article-body { flex:1; min-width: 0; }
  .article-title-line { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .article-title-line a { color: var(--link); text-decoration: none; font-size: 14px; font-weight: 500; }
  .article-title-line a:visited { color: var(--link-visited); }
  .article-title-line a:hover { text-decoration: underline; }
  .article-source-link { font-size: 12px; color: var(--text-secondary); }
  .article-source-link a { color: var(--text-secondary); text-decoration: none; }
  .article-source-link a:hover { text-decoration: underline; }
  .article-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .article-meta span { margin-right: 8px; }
  .article-tag { color: var(--accent); font-size: 10px; background: rgba(255,102,0,.08); padding: 1px 4px; border-radius: 2px; margin-left: 4px; }

  .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-secondary); border-top: 2px solid var(--accent); margin-top: 20px; }
  .footer a { color: var(--text-secondary); }

  @media (max-width: 600px) {
    .topbar-inner { gap: 8px; font-size: 12px; }
    .article-num { min-width: 16px; font-size: 11px; }
    .article-title-line a { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="#" class="logo">⚡ SecWeekly</a>
    <a href="#">new</a><span class="sep">|</span>
    <a href="#">past</a><span class="sep">|</span>
    <a href="https://github.com/Fee1in/SecWeekly" target="_blank">github</a><span class="sep">|</span>
    <span class="date">__DATE__</span>
  </div>
</div>

<div class="container">
  <div class="search-row">
    <input type="text" placeholder="Search articles..." oninput="render()" id="searchInput">
  </div>
  <div class="tag-nav" id="tagNav">
    <a class="active" onclick="setTag(null)">all</a>
  </div>
  <div id="articles"></div>
  <div class="footer">
    Generated by GitHub Actions · Updated daily · <a href="https://github.com/Fee1in/SecWeekly">View on GitHub</a>
  </div>
</div>

<script>
const DATA = __DATA_PLACEHOLDER__;

let activeTag = null;

function getAllTags() {
  const set = new Set();
  DATA.forEach(a => a.tags.forEach(t => set.add(t)));
  return [...set].sort();
}

function renderTagNav() {
  const tags = getAllTags();
  const html = tags.map(t => `<a onclick="setTag('${t}')" data-tag="${t}">${t}</a>`).join('');
  document.getElementById('tagNav').innerHTML = '<a class="active" onclick="setTag(null)">all</a> ' + html;
}

function setTag(tag) {
  activeTag = activeTag === tag ? null : tag;
  document.querySelectorAll('#tagNav a').forEach(el => el.classList.toggle('active', el.dataset.tag === activeTag || (!el.dataset.tag && !activeTag)));
  render();
}

function render() {
  const keyword = document.getElementById('searchInput').value.toLowerCase();
  let articles = DATA;
  if (keyword) articles = articles.filter(a => a.title.toLowerCase().includes(keyword) || a.summary.toLowerCase().includes(keyword) || a.tags.some(t => t.toLowerCase().includes(keyword)));
  if (activeTag) articles = articles.filter(a => a.tags.includes(activeTag));

  const html = articles.map((a, i) => `
    <div class="article-item">
      <span class="article-num${i < 3 ? ' top' : ''}">${i + 1}</span>
      <div class="article-body">
        <div class="article-title-line">
          <a href="${a.url || '#'}" target="_blank" rel="noopener">${a.title}</a>
          <span class="article-source-link">(${a.source_icon} <a href="#">${a.source}</a>)</span>
        </div>
        <div class="article-meta">
          <span>${a.read_time} min read</span>
          <span>${a.date}</span>
          ${a.tags.map(t => `<span class="article-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('articles').innerHTML = html || '<div style="text-align:center;padding:40px;color:#828282;">No articles found. Waiting for first crawl...</div>';
}

renderTagNav();
render();
</script>

</body>
</html>
